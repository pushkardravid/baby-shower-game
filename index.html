<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#ffd4e6">
<link rel="manifest" href="manifest.json">
<title>Design the Baby</title>
<style>
:root{
  --mom:#ff5d9d; --dad:#1593ff; --ink:#172044; --muted:#7c7180;
  --cream:#fff8ee; --blush:#fff1f7; --card:#fffdfb; --line:rgba(42,32,62,.10);
  --shadow:0 18px 45px rgba(96,55,84,.14);
  --skin:#f4c29d; --hair:#2b1b19; --outfit:#fff1df;
}
*{box-sizing:border-box}
body{
  margin:0; min-height:100vh; color:var(--ink);
  font-family:ui-rounded,"SF Pro Rounded",system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:
    radial-gradient(circle at 14% 8%,#fff 0 10px,transparent 11px),
    radial-gradient(circle at 86% 12%,#fff 0 8px,transparent 9px),
    radial-gradient(circle at 10% 82%,#fff 0 7px,transparent 8px),
    linear-gradient(150deg,#fff9ef,#fff1f8 55%,#f4efff);
}
.page{max-width:1180px;margin:0 auto;padding:18px 14px 36px}
.hero{text-align:center;padding:14px 0 10px}
h1{font-size:clamp(36px,7vw,72px);line-height:.9;margin:8px 0 8px;letter-spacing:-2px}
.script{color:var(--mom)}
.ribbon{display:inline-flex;background:linear-gradient(135deg,#ff6ca5,#ff9f68);color:white;border-radius:999px;padding:10px 18px;font-weight:1000;box-shadow:0 10px 24px rgba(255,92,157,.25)}
.sub{font-weight:800;color:#5b5263;margin-top:10px}
.layout{display:grid;grid-template-columns:250px 1fr 310px;gap:16px;align-items:start}
.card{background:rgba(255,255,255,.86);border:1px solid var(--line);border-radius:26px;box-shadow:var(--shadow);padding:14px;backdrop-filter:blur(10px)}
.parent{overflow:hidden;padding:10px}
.parent img{width:100%;height:270px;object-fit:cover;border-radius:22px;display:block}
.parent.mom{border:2px solid rgba(255,93,157,.28)}
.parent.dad{border:2px solid rgba(21,147,255,.25)}
.parent-label{margin:-34px auto 0;position:relative;width:max-content;background:white;border:2px solid currentColor;border-radius:16px;padding:8px 18px;font-weight:1000;box-shadow:0 8px 18px rgba(0,0,0,.12)}
.mom .parent-label{color:var(--mom)} .dad .parent-label{color:var(--dad)}
.main-card{padding:16px}
.resemblance{margin-bottom:14px;text-align:center}
.resemblance h2{font-size:22px;margin:0 0 8px}
.slider-row{display:flex;align-items:center;gap:12px;font-weight:1000;color:#78606e}
input[type=range]{flex:1;accent-color:var(--mom)}
.pct{margin-top:6px;font-weight:1000;color:#5d5260}
.baby-card{position:relative;overflow:hidden;min-height:560px;display:flex;align-items:center;justify-content:center;background:linear-gradient(180deg,#fff,#fff7fb);border-radius:28px}
.baby-card:before{content:"♡";position:absolute;left:26px;top:80px;color:var(--mom);font-size:34px;opacity:.75}
.baby-card:after{content:"✦";position:absolute;right:28px;top:105px;color:#ffc84a;font-size:30px;opacity:.9}
.baby-title{position:absolute;top:16px;font-size:28px;font-weight:1000}
.tap-note{position:absolute;bottom:18px;background:white;border-radius:18px;padding:13px 18px;font-weight:900;box-shadow:0 10px 22px rgba(0,0,0,.08)}
.avatar{position:relative;width:330px;height:390px;transform:translateY(26px)}
.glow{position:absolute;left:50%;top:20px;transform:translateX(-50%);width:260px;height:260px;border-radius:50%;background:#ffef9e;filter:blur(25px);opacity:.38}
.body{position:absolute;left:50%;bottom:0;transform:translateX(-50%);width:190px;height:142px;background:var(--outfit);border-radius:62px 62px 42px 42px;border:4px solid rgba(30,20,40,.08);z-index:1}
.body:before{content:"";position:absolute;left:50%;top:22px;transform:translateX(-50%);width:80px;height:42px;background:white;border-radius:0 0 40px 40px}
.neck{position:absolute;left:50%;top:220px;transform:translateX(-50%);width:58px;height:48px;background:var(--skin);border-radius:22px;z-index:1}
.ear{position:absolute;top:129px;width:42px;height:52px;background:var(--skin);border-radius:50%;border:4px solid rgba(30,20,40,.08);z-index:3}.ear.l{left:43px}.ear.r{right:43px}
.face{position:absolute;left:50%;top:48px;transform:translateX(-50%);width:220px;height:205px;background:var(--skin);border-radius:var(--faceRadius,48% 48% 53% 53%);border:4px solid rgba(30,20,40,.08);z-index:4;box-shadow:inset 0 -12px rgba(133,83,66,.08),0 16px 32px rgba(80,45,70,.12)}
.cheek{position:absolute;top:137px;width:46px;height:26px;background:#ff88a9;border-radius:50%;opacity:.42}.cheek.l{left:38px}.cheek.r{right:38px}
.brow{position:absolute;top:76px;width:42px;height:13px;border-top:6px solid #4d2e2a;border-radius:50%;opacity:var(--browOpacity,.55);z-index:8}.brow.l{left:49px;transform:rotate(var(--browTiltL,-5deg))}.brow.r{right:49px;transform:rotate(var(--browTiltR,5deg))}
.eye{position:absolute;top:96px;width:32px;height:32px;background:#3c282b;border-radius:50%;box-shadow:inset 7px 5px white;z-index:8}.eye.l{left:55px}.eye.r{right:55px}
.eye.dad{height:23px;border-radius:55% 55% 45% 45%;top:101px}
.eye.sleepy{height:9px;background:transparent;border-bottom:5px solid #3c282b;border-radius:0;box-shadow:none}
.nose{position:absolute;left:50%;top:130px;transform:translateX(-50%);z-index:8}
.mouth{position:absolute;left:50%;top:160px;transform:translateX(-50%);z-index:8}
.hair{position:absolute;left:50%;top:22px;transform:translateX(-50%);width:230px;height:126px;z-index:10}
.hair svg{width:100%;height:100%}
.bow{position:absolute;left:50%;top:24px;transform:translateX(-50%);z-index:14;width:84px;height:46px;display:none}.bow.show{display:block}
.bow:before,.bow:after{content:"";position:absolute;width:38px;height:34px;background:#ff73a9;border-radius:60% 50% 50% 12%;top:8px}.bow:before{left:5px}.bow:after{right:5px;border-radius:50% 60% 12% 50%}.bow span{position:absolute;left:50%;top:18px;transform:translateX(-50%);width:22px;height:22px;background:#ff4a93;border-radius:50%}
.features{display:grid;gap:10px}
.feature-card{background:rgba(255,255,255,.84);border:1px solid var(--line);border-radius:22px;padding:12px;box-shadow:0 10px 24px rgba(0,0,0,.06)}
.feature-title{display:flex;align-items:center;gap:8px;font-size:18px;font-weight:1000;margin-bottom:10px}
.pick-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.pick{border:2px solid transparent;background:#fff;border-radius:16px;overflow:hidden;padding:0;text-align:center;color:#554858;font-weight:1000;box-shadow:0 6px 16px rgba(0,0,0,.06)}
.pick img{display:block;width:100%;height:70px;object-fit:cover}
.pick span{display:block;padding:7px 4px;font-size:12px}
.pick.mom.active{border-color:var(--mom);box-shadow:0 0 0 4px rgba(255,93,157,.14)}
.pick.dad.active{border-color:var(--dad);box-shadow:0 0 0 4px rgba(21,147,255,.14)}
.form h2{font-size:24px;margin:4px 0 12px}
.field{margin:12px 0}
label{display:block;font-size:13px;font-weight:1000;color:#665b68;margin-bottom:6px}
input,textarea,select{width:100%;border:1px solid var(--line);border-radius:16px;background:#fff;padding:13px 14px;font:inherit;outline:none;color:var(--ink)}
textarea{min-height:88px;resize:vertical}
.gender{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.gender button{border:1px solid var(--line);border-radius:14px;background:#fff;padding:10px;font-weight:1000}
.gender button.active:nth-child(1){background:#e9f4ff;border-color:#6bb7ff;color:#0070d8}
.gender button.active:nth-child(2){background:#fff0f7;border-color:#ff8fbc;color:#e74486}
.gender button.active:nth-child(3){background:#fff4d7;border-color:#ffc84a;color:#a66a00}
.primary{width:100%;border:0;border-radius:18px;background:linear-gradient(135deg,#ff5d9d,#ff9e67);color:white;padding:15px;font-weight:1000;font-size:16px;box-shadow:0 12px 25px rgba(255,93,157,.32)}
.secondary{border:1px solid var(--line);background:white;border-radius:14px;padding:10px 12px;font-weight:1000;color:#625563}
.gallery{margin-top:16px}
.gallery-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.entry{background:white;border:1px solid var(--line);border-radius:20px;padding:12px;margin:10px 0;box-shadow:0 8px 18px rgba(0,0,0,.04)}
.entry b{font-size:15px}.meta{font-size:12px;color:#7b7180;line-height:1.35;margin-top:4px}.quote{font-size:14px;margin-top:8px}
.confetti{position:fixed;inset:0;pointer-events:none;z-index:20;overflow:hidden}.confetti i{position:absolute;top:-20px;width:10px;height:16px;border-radius:4px;animation:fall 1200ms ease-in forwards}
@keyframes fall{to{transform:translateY(110vh) rotate(760deg);opacity:0}}
.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(110px);background:#251f2d;color:white;border-radius:999px;padding:13px 16px;font-weight:1000;z-index:30;transition:.35s}.toast.show{transform:translateX(-50%) translateY(0)}
.mobile-parents{display:none;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:900px){
  .layout{display:block}
  .desktop-only{display:none}
  .mobile-parents{display:grid}
  .parent img{height:190px}
  .baby-card{min-height:500px}
  .avatar{transform:translateY(30px) scale(.9)}
  .features{margin-top:14px}
}
</style>
</head>
<body>
<div class="confetti" id="confetti"></div>
<div class="toast" id="toast">Saved 💖</div>
<main class="page">
  <section class="hero">
    <h1>Design <span class="script">the Baby</span></h1>
    <div class="ribbon">A baby shower game</div>
    <div class="sub">Pick Mom or Dad traits, then make your cutest prediction.</div>
  </section>

  <section class="mobile-parents">
    <div class="card parent mom"><img src="assets/mom.jpg" alt="Mom"><div class="parent-label">♡ Mom</div></div>
    <div class="card parent dad"><img src="assets/dad.jpg" alt="Dad"><div class="parent-label">💙 Dad</div></div>
  </section>

  <section class="layout">
    <aside>
      <div class="card parent mom desktop-only"><img src="assets/mom.jpg" alt="Mom"><div class="parent-label">♡ Mom</div></div>
      <div class="features" id="leftFeatures"></div>
    </aside>

    <section class="card main-card">
      <div class="resemblance">
        <h2>♡ Resemblance ♡</h2>
        <div class="slider-row"><span>Mom</span><input id="slider" type="range" min="0" max="100" value="50"><span>Dad</span></div>
        <div class="pct" id="pct">50% Mom · 50% Dad</div>
      </div>
      <div class="baby-card">
        <div class="baby-title">Our Baby</div>
        <div class="avatar">
          <div class="glow"></div>
          <div class="body"></div>
          <div class="neck"></div>
          <div class="ear l"></div><div class="ear r"></div>
          <div class="face" id="face">
            <div class="brow l"></div><div class="brow r"></div>
            <div class="eye l" id="eyeL"></div><div class="eye r" id="eyeR"></div>
            <div class="cheek l"></div><div class="cheek r"></div>
            <div class="nose" id="nose"></div>
            <div class="mouth" id="mouth"></div>
          </div>
          <div class="hair" id="hair"></div>
          <div class="bow show" id="bow"><span></span></div>
        </div>
        <div class="tap-note">Tap Mom/Dad features below 👇</div>
      </div>
    </section>

    <aside>
      <div class="card parent dad desktop-only"><img src="assets/dad.jpg" alt="Dad"><div class="parent-label">💙 Dad</div></div>
      <div class="card form">
        <h2>Make Your Predictions! ✨</h2>
        <div class="field"><label>Baby's name</label><input id="babyName" placeholder="Enter your guess"></div>
        <div class="field"><label>Boy / Girl / Surprise</label>
          <div class="gender" id="gender">
            <button type="button" data-v="Boy">Boy</button>
            <button type="button" data-v="Girl" class="active">Girl</button>
            <button type="button" data-v="Surprise">Surprise</button>
          </div>
        </div>
        <div class="field"><label>Birth date</label><input id="birthDate" placeholder="e.g. Oct 12"></div>
        <div class="field"><label>Birth weight</label><input id="birthWeight" placeholder="e.g. 7 lb 2 oz"></div>
        <div class="field"><label>Funny prediction / advice</label><textarea id="prediction" placeholder="e.g. Mom's eyes, Dad's smile, and already refusing bedtime."></textarea></div>
        <div class="field"><label>Your name</label><input id="guestName" placeholder="Guest name"></div>
        <button class="primary" id="submit" type="button">Submit My Guess ♡</button>
      </div>

      <div class="card gallery">
        <div class="gallery-head"><h2>Gallery</h2><button class="secondary" id="clear" type="button">Clear</button></div>
        <div id="entries"></div>
      </div>
    </aside>
  </section>
</main>

<script>
const featureDefs = [
  ["eyes","👀 Eyes","Mom's Eyes","Dad's Eyes"],
  ["hair","💇 Hair","Mom's Hair","Dad's Hair"],
  ["nose","👃 Nose","Mom's Nose","Dad's Nose"],
  ["smile","😊 Smile","Mom's Smile","Dad's Smile"],
  ["face","🧒 Face Shape","Mom's Face","Dad's Face"]
];

const state = {eyes:"mom",hair:"dad",nose:"mom",smile:"mom",face:"mom",gender:"Girl",slider:50};

const svgs = {
  hair: {
    mom: `<svg viewBox="0 0 230 126"><path fill="var(--hair)" d="M18 104 C18 49 55 15 113 14 C176 12 214 52 213 108 C180 84 146 76 115 78 C80 80 48 84 18 104z"/><path fill="rgba(255,255,255,.11)" d="M43 80 C58 36 99 25 145 31 C104 39 82 58 74 95z"/><path fill="rgba(0,0,0,.16)" d="M110 18 C103 45 108 61 127 82 C105 75 94 60 92 37z"/></svg>`,
    dad: `<svg viewBox="0 0 230 126"><path fill="var(--hair)" d="M20 94 C25 40 68 12 121 17 C177 22 210 55 204 101 C168 68 111 57 35 105z"/><path fill="rgba(255,255,255,.13)" d="M59 58 C90 27 143 24 184 56 C138 43 96 49 59 82z"/></svg>`
  },
  nose: {
    mom: `<svg width="38" height="34" viewBox="0 0 38 34"><path d="M20 5 C14 15 14 23 22 25" fill="none" stroke="#b67470" stroke-width="4" stroke-linecap="round"/><path d="M13 26 C18 29 24 29 28 25" fill="none" stroke="#b67470" stroke-width="3" stroke-linecap="round"/></svg>`,
    dad: `<svg width="40" height="36" viewBox="0 0 40 36"><path d="M19 4 C27 16 27 25 18 27" fill="none" stroke="#b67470" stroke-width="4" stroke-linecap="round"/><path d="M13 28 C19 31 26 31 31 26" fill="none" stroke="#b67470" stroke-width="3" stroke-linecap="round"/></svg>`
  },
  mouth: {
    mom: `<svg width="66" height="38" viewBox="0 0 66 38"><path d="M13 10 C20 31 47 31 54 10" fill="none" stroke="#9b465a" stroke-width="6" stroke-linecap="round"/><path d="M19 13 C29 18 39 18 49 13" fill="none" stroke="#ffb1bd" stroke-width="3" stroke-linecap="round"/></svg>`,
    dad: `<svg width="70" height="38" viewBox="0 0 70 38"><path d="M12 9 C21 33 51 32 58 8" fill="none" stroke="#934456" stroke-width="6" stroke-linecap="round"/><path d="M21 10 H49" stroke="white" stroke-width="4" stroke-linecap="round"/></svg>`
  }
};

function renderFeatureCards(){
  const html = featureDefs.map(([key,title,momLabel,dadLabel]) => `
    <div class="feature-card">
      <div class="feature-title">${title}</div>
      <div class="pick-row">
        <button type="button" class="pick mom ${state[key]==='mom'?'active':''}" data-key="${key}" data-v="mom">
          <img src="assets/mom_${key==='smile'?'smile':key}.jpg" alt="${momLabel}">
          <span>${momLabel}</span>
        </button>
        <button type="button" class="pick dad ${state[key]==='dad'?'active':''}" data-key="${key}" data-v="dad">
          <img src="assets/dad_${key==='smile'?'smile':key}.jpg" alt="${dadLabel}">
          <span>${dadLabel}</span>
        </button>
      </div>
    </div>
  `).join("");
  leftFeatures.innerHTML = html;
  leftFeatures.querySelectorAll(".pick").forEach(btn => {
    btn.onclick = () => {
      state[btn.dataset.key] = btn.dataset.v;
      renderFeatureCards();
      renderBaby();
    };
  });
}

function renderBaby(){
  document.documentElement.style.setProperty("--faceRadius", state.face === "mom" ? "48% 48% 54% 54%" : "45% 45% 50% 50%");
  document.documentElement.style.setProperty("--browOpacity", state.eyes === "dad" ? ".9" : ".55");
  document.documentElement.style.setProperty("--browTiltL", state.eyes === "dad" ? "-2deg" : "-8deg");
  document.documentElement.style.setProperty("--browTiltR", state.eyes === "dad" ? "2deg" : "8deg");
  hair.innerHTML = svgs.hair[state.hair];
  nose.innerHTML = svgs.nose[state.nose];
  mouth.innerHTML = svgs.mouth[state.smile];
  eyeL.className = "eye l" + (state.eyes === "dad" ? " dad" : "");
  eyeR.className = "eye r" + (state.eyes === "dad" ? " dad" : "");
}

function renderSlider(){
  state.slider = Number(slider.value);
  pct.textContent = `${100-state.slider}% Mom · ${state.slider}% Dad`;
}

slider.oninput = () => { renderSlider(); };

gender.querySelectorAll("button").forEach(b => {
  b.onclick = () => {
    gender.querySelectorAll("button").forEach(x=>x.classList.remove("active"));
    b.classList.add("active");
    state.gender = b.dataset.v;
  };
});

function getEntries(){ return JSON.parse(localStorage.getItem("babyV4Entries") || "[]");}
function setEntries(x){ localStorage.setItem("babyV4Entries", JSON.stringify(x));}
function esc(s){return String(s||"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[m]));}
function renderEntries(){
  const data = getEntries();
  if(!data.length){ entries.innerHTML = `<div class="meta">No guesses yet. First guest gets bragging rights ✨</div>`; return; }
  entries.innerHTML = data.slice().reverse().map(e => `
    <div class="entry">
      <b>${esc(e.guestName || "Anonymous")}'s guess</b>
      <div class="meta">
        Name: ${esc(e.babyName || "?")} · ${esc(e.gender)} · Date: ${esc(e.birthDate || "?")} · Weight: ${esc(e.birthWeight || "?")}<br>
        ${esc(e.eyes)} eyes · ${esc(e.hair)} hair · ${esc(e.nose)} nose · ${esc(e.smile)} smile · ${100-e.slider}% Mom/${e.slider}% Dad
      </div>
      <div class="quote">“${esc(e.prediction || "Cute, chaotic, perfect.")}”</div>
    </div>
  `).join("");
}
function toast(msg){
  const t = document.getElementById("toast"); t.textContent = msg; t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),1500);
}
function burst(){
  const colors=["#ff5d9d","#1593ff","#ffc84a","#8ee6b7","#c9b3ff"];
  confetti.innerHTML="";
  for(let i=0;i<52;i++){
    const el=document.createElement("i");
    el.style.left=Math.random()*100+"vw";
    el.style.background=colors[Math.floor(Math.random()*colors.length)];
    el.style.animationDelay=Math.random()*250+"ms";
    confetti.appendChild(el);
  }
  setTimeout(()=>confetti.innerHTML="",1600);
}
submit.onclick = () => {
  const entry = {
    eyes: state.eyes === "mom" ? "Mom's" : "Dad's",
    hair: state.hair === "mom" ? "Mom's" : "Dad's",
    nose: state.nose === "mom" ? "Mom's" : "Dad's",
    smile: state.smile === "mom" ? "Mom's" : "Dad's",
    face: state.face === "mom" ? "Mom's" : "Dad's",
    slider: state.slider,
    gender: state.gender,
    babyName: babyName.value.trim(),
    birthDate: birthDate.value.trim(),
    birthWeight: birthWeight.value.trim(),
    prediction: prediction.value.trim(),
    guestName: guestName.value.trim(),
    createdAt: new Date().toISOString()
  };
  const data = getEntries(); data.push(entry); setEntries(data);
  renderEntries(); burst(); toast("Guess saved 💖"); prediction.value="";
};
clear.onclick = () => {
  if(confirm("Clear guesses saved on this device?")){ setEntries([]); renderEntries(); toast("Gallery cleared");}
};

renderFeatureCards();
renderBaby();
renderSlider();
renderEntries();

if("serviceWorker" in navigator){
  navigator.serviceWorker.register("./service-worker.js").catch(()=>{});
}
</script>
</body>
</html>
