<!doctype html>
<html><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Design the Baby V7</title>
<style>
body{font-family:-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;background:#fafaf8;color:#111;margin:0}
.wrap{max-width:900px;margin:auto;padding:24px}
.hero{text-align:center}
h1{font-size:56px;margin:10px 0}
.avatars{display:flex;justify-content:center;align-items:center;gap:16px;margin:20px 0}
.avatars img{width:90px;height:90px;border-radius:50%;object-fit:cover}
.card{background:white;border:1px solid #e8e8e8;border-radius:24px;padding:20px;margin:18px 0}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
select,input,textarea{width:100%;padding:12px;border-radius:12px;border:1px solid #ddd}
button{padding:14px 18px;border-radius:14px;border:none;background:#111;color:#fff;font-weight:700}
.secondary{background:#eee;color:#111}
#portrait{width:100%;max-width:650px;border-radius:24px;display:block;margin:auto}
.loader{display:none;position:fixed;inset:0;background:rgba(250,250,248,.97);align-items:center;justify-content:center}
.loader.show{display:flex}
.fact{max-width:500px;text-align:center;font-size:22px}
</style></head>
<body>
<div class="loader" id="loader"><div class="fact"><h2>Generating your baby...</h2><div id="fact"></div></div></div>
<div class="wrap">
<div class="hero">
<h1>Design the Baby</h1>
<div class="avatars">
<img src="assets/mom.jpg"><div>❤️</div><img src="assets/dad.jpg">
</div>
</div>

<div class="card">
<div class="grid">
<div><label>Hair Type</label><select id="hair"><option>Straight</option><option>Wavy</option><option>Curly</option></select></div>
<div><label>Eye Size</label><select id="eyes"><option>Large</option><option>Medium</option><option>Small</option></select></div>
<div><label>Smile</label><select id="smile"><option>Big Smile</option><option>Gentle Smile</option></select></div>
<div><label>Cheeks</label><select id="cheeks"><option>Chubby</option><option>Normal</option></select></div>
</div>
<br>
<label>Resemblance to Mom</label>
<input type="range" min="0" max="100" value="50" id="momPercent">
<br><br>
<label>Future Personality</label>
<select id="personality">
<option>Future CEO</option><option>Artist</option><option>Athlete</option><option>Scientist</option><option>Bookworm</option><option>Troublemaker</option>
</select>
<br><br>
<label>Anything else?</label>
<textarea id="custom"></textarea>
<br><br>
<button id="gen">✨ Generate Baby</button>
<button id="surprise" class="secondary">🎲 Surprise Me</button>
</div>

<div class="card">
<img id="portrait" src="assets/portrait_mmmm.jpg">
</div>
</div>

<script>
const facts=[
"Blending Mom and Dad features...",
"Picking the perfect baby smile...",
"Designing tiny cheeks...",
"Future troublemaker calibration in progress...",
"Generating baby cuteness..."
];
let timer;
function startLoader(){
loader.classList.add('show');
let i=0; fact.textContent=facts[0];
timer=setInterval(()=>{i=(i+1)%facts.length;fact.textContent=facts[i]},2500);
}
function stopLoader(){loader.classList.remove('show');clearInterval(timer);}
function body(){
return {
gender:"girl",
momPercent:+momPercent.value,
eyes:eyes.value,
hair:hair.value,
smile:smile.value,
face:"balanced",
customPrompt:
`Hair Type: ${hair.value}. Eye Size: ${eyes.value}. Smile: ${smile.value}. Cheeks: ${cheeks.value}. Personality: ${personality.value}. ${custom.value}`
};
}
gen.onclick=async()=>{
startLoader();
try{
const r=await fetch('/api/generate-baby',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body())});
const d=await r.json();
if(!r.ok) throw new Error(d.error);
portrait.src=d.imageDataUrl;
}finally{stopLoader();}
};
surprise.onclick=()=>{
hair.selectedIndex=Math.floor(Math.random()*hair.options.length);
eyes.selectedIndex=Math.floor(Math.random()*eyes.options.length);
smile.selectedIndex=Math.floor(Math.random()*smile.options.length);
cheeks.selectedIndex=Math.floor(Math.random()*cheeks.options.length);
personality.selectedIndex=Math.floor(Math.random()*personality.options.length);
momPercent.value=Math.floor(Math.random()*101);
gen.click();
};
</script>
</body></html>
